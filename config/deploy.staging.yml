service: template_staging

image: noahbaumgartner2/template

# Staging-Server (derselbe Host wie Production)
servers:
  web:
    - 179.237.87.63

volumes:
  - /var/lib/template_staging/storage:/rails/storage

ssh:
  user: ubuntu
  keys:
    - ~/.ssh/template_deploy

# TBD: hier die Staging-Domain eintragen (z. B. test.meine-domain.ch)
proxy:
  ssl: true
  host: TBD_STAGING_DOMAIN
  app_port: 3000

registry:
  server: ghcr.io
  username: noahbaumgartner2
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    DB_HOST: template_staging-db
    DB_USERNAME: template_staging
    DB_NAME: template_staging
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD_STAGING

accessories:
  db:
    image: postgres:16
    host: 179.237.87.63
    port: "127.0.0.1:5433:5432"
    env:
      clear:
        POSTGRES_USER: template_staging
        POSTGRES_DB: template_staging
      secret:
        - POSTGRES_PASSWORD_STAGING
    directories:
      - data:/var/lib/postgresql/data

builder:
  arch: amd64

aliases:
  migrate: app exec --interactive --reuse 'bin/rails db:migrate'
